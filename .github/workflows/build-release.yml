name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build environment (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Set up build environment (macOS)
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install cmake

    - name: Install MinGW (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install mingw -y
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH

    - name: Get llama.cpp commit
      id: get_commit
      shell: bash
      run: |
        LLAMA_COMMIT=$(git submodule status llama.cpp | awk '{print $1}')
        echo "llama_commit=${LLAMA_COMMIT}" >> $GITHUB_OUTPUT
        echo "Llama.cpp commit: ${LLAMA_COMMIT}"

    - name: Build library
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          export PATH="/c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin:$PATH"
          export CC=gcc
          export CXX=g++
        fi
        make clean
        make libbinding.a

    - name: Create artifact directory
      run: |
        mkdir -p artifacts

    - name: Copy artifacts
      run: |
        # Copy pre-built library
        cp libbinding.a artifacts/
        
        # Copy source files needed for CGO
        cp binding.h artifacts/
        cp binding.cpp artifacts/
        cp llama_data_source.h artifacts/
        cp llama_data_source.cpp artifacts/
        
        # Copy Go source files (excluding test files)
        cp llama.go artifacts/
        cp options.go artifacts/
        cp llama_openblas.go artifacts/
        cp llama_cublas.go artifacts/
        
        # Copy go.mod and go.sum
        cp go.mod artifacts/
        cp go.sum artifacts/
        
        # Copy patches (already applied to libbinding.a, but included for reference)
        mkdir -p artifacts/patches
        cp patches/*.patch artifacts/patches/
        
        # Create a minimal .gitmodules file pointing to the correct commit
        echo "[submodule \"llama.cpp\"]" > artifacts/.gitmodules
        echo "	path = llama.cpp" >> artifacts/.gitmodules
        echo "	url = https://github.com/ggerganov/llama.cpp" >> artifacts/.gitmodules
        
        # Copy setup script
        cp scripts/setup-llama-cpp.sh artifacts/setup.sh
        chmod +x artifacts/setup.sh
        
        # Save llama.cpp commit hash
        echo "${{ steps.get_commit.outputs.llama_commit }}" > artifacts/LLAMA_COMMIT

    - name: Create tarball
      run: |
        cd artifacts
        tar -czf ../libbinding-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libbinding-${{ matrix.platform }}-${{ matrix.arch }}
        path: libbinding-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get llama.cpp commit
      id: get_commit
      run: |
        LLAMA_COMMIT=$(git submodule status llama.cpp | awk '{print $1}')
        echo "llama_commit=${LLAMA_COMMIT}" >> $GITHUB_OUTPUT
        echo "Llama.cpp commit: ${LLAMA_COMMIT}"
        # Also store for the build job
        echo "LLAMA_COMMIT=${LLAMA_COMMIT}" >> $GITHUB_ENV

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          Pre-built libraries for go-llama.cpp
          
          **llama.cpp commit**: `${{ steps.get_commit.outputs.llama_commit }}`
          
          To use these pre-built libraries, make sure your llama.cpp submodule is at the same commit.
        draft: false
        prerelease: false

    - name: Upload Release Assets
      run: |
        for file in libbinding-*/libbinding-*.tar.gz; do
          echo "Uploading $file"
          asset_name=$(basename "$file")
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @"$file" \
            "${{ steps.create_release.outputs.upload_url }}?name=${asset_name}"
        done